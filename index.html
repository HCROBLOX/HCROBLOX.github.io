<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rain Share</title>

<meta name="description" content="Rain Share - Community Script Sharing Website">

<meta name="keywords" content="Rain Share, Roblox Script, Script Hub">

<link rel="icon" href="logo.png">

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#111827;
    padding:25px;
    text-align:center;
    border-bottom:3px solid #38bdf8;
    position:sticky;
    top:0;
    z-index:999;
}

.logo img{
    width:130px;
    border-radius:20px;
    box-shadow:0 0 25px #38bdf8;
}

header h1{
    color:#38bdf8;
    margin-top:15px;
    font-size:42px;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    margin-top:30px;
}

.box{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
}

h2{
    color:#38bdf8;
    margin-bottom:15px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:15px;
}

textarea{
    height:140px;
    resize:none;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:15px;
    cursor:pointer;
    margin-top:15px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

.copy-btn{
    background:#22c55e;
    margin-right:10px;
}

.delete-btn{
    background:#ef4444;
}

.like-btn{
    background:#f43f5e;
}

.script{
    background:#334155;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
    animation:fade 0.3s ease;
}

.script img{
    width:100%;
    border-radius:15px;
    margin-top:10px;
}

.script h3{
    color:#38bdf8;
}

.script p{
    margin-top:10px;
    color:#cbd5e1;
}

.script pre{
    margin-top:15px;
    white-space:pre-wrap;
    color:#e2e8f0;
}

.hidden{
    display:none;
}

.menu-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:#38bdf8;
    width:60px;
    height:60px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    z-index:9999;
}

.sidebar{
    position:fixed;
    top:0;
    right:-300px;
    width:280px;
    height:100%;
    background:#111827;
    padding:20px;
    transition:0.3s;
    z-index:99999;
}

.sidebar.active{
    right:0;
}

.sidebar h1{
    color:#38bdf8;
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    margin-top:10px;
}

.footer{
    text-align:center;
    color:#94a3b8;
    padding:25px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stat{
    background:#334155;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.stat h1{
    color:#38bdf8;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

<div class="sidebar" id="sidebar">

<h1>🌧 Rain Share</h1>

<button onclick="window.scrollTo(0,0)">
🏠 Home
</button>

<button onclick="document.getElementById('shareBox').scrollIntoView()">
📤 Share
</button>

<button onclick="document.getElementById('communityBox').scrollIntoView()">
🌍 Scripts
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<header>

<div class="logo">

<img src="logo.png">

</div>

<h1>🌧 Rain Share</h1>

<p>Community Script Sharing Website</p>

</header>

<div class="container">

<div class="stats">

<div class="stat">
<h1 id="scriptCount">0</h1>
<p>Scripts</p>
</div>

<div class="stat">
<h1 id="userCount">0</h1>
<p>Users</p>
</div>

</div>

<!-- LOGIN -->

<div class="box" id="authBox">

<h2>🔐 Login</h2>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">
Login
</button>

<hr style="margin-top:20px;margin-bottom:20px;">

<h2>📝 Register</h2>

<input type="text" id="registerUser" placeholder="Username">

<input type="password" id="registerPass" placeholder="Password">

<button onclick="register()">
Register
</button>

</div>

<!-- MAIN -->

<div id="mainBox" class="hidden">

<div class="box">

<input type="text" id="search" placeholder="🔎 Search script realtime..." onkeyup="searchScript()">

</div>

<div class="box" id="shareBox">

<h2>📤 Share Script</h2>

<input type="text" id="title" placeholder="Script title">

<input type="text" id="keywords" placeholder="Keywords">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="content" placeholder="Paste script here"></textarea>

<input type="text" id="image" placeholder="Image URL (optional)">

<input type="text" id="file" placeholder="File URL (optional)">

<select id="type">

<option value="community">
🌍 Community Share
</option>

<option value="admin">
👑 Admin Share
</option>

</select>

<button onclick="shareScript()">
Share Script
</button>

</div>

<div class="box">

<h2>👑 Admin Share</h2>

<div id="adminScripts"></div>

</div>

<div class="box" id="communityBox">

<h2>🌍 Community Share</h2>

<div id="communityScripts"></div>

</div>

</div>

</div>

<div class="footer">

Rain Share © 2026

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

    databaseURL:
    "https://rain-share-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* USERS */

let users = [];

let currentUser =
JSON.parse(localStorage.getItem("currentUser"));

db.ref("users").on("value", snapshot => {

    users = [];

    snapshot.forEach(child => {

        users.push(child.val());

    });

    document.getElementById("userCount")
    .innerText = users.length;

});

/* REGISTER */

function register(){

    let user =
    document.getElementById("registerUser").value;

    let pass =
    document.getElementById("registerPass").value;

    if(!user || !pass){

        alert("Fill all");
        return;
    }

    let exist = users.find(
        u => u.username === user
    );

    if(exist){

        alert("Username exists");
        return;
    }

    let role = "user";

    if(user === "admin"){

        role = "admin";
    }

    db.ref("users/" + user).set({

        username:user,
        password:pass,
        role:role,
        createdAt:Date.now()

    });

    alert("Register success");
}

/* LOGIN */

function login(){

    let user =
    document.getElementById("loginUser").value;

    let pass =
    document.getElementById("loginPass").value;

    let found = users.find(
        u =>
        u.username === user &&
        u.password === pass
    );

    if(!found){

        alert("Wrong account");
        return;
    }

    currentUser = found;

    localStorage.setItem(
        "currentUser",
        JSON.stringify(found)
    );

    loadUI();
}

/* LOGOUT */

function logout(){

    localStorage.removeItem("currentUser");

    location.reload();
}

/* UI */

function loadUI(){

    if(currentUser){

        document.getElementById("authBox")
        .classList.add("hidden");

        document.getElementById("mainBox")
        .classList.remove("hidden");

    }else{

        document.getElementById("authBox")
        .classList.remove("hidden");

        document.getElementById("mainBox")
        .classList.add("hidden");

    }
}

/* SHARE */

function shareScript(){

    let title =
    document.getElementById("title").value;

    let keywords =
    document.getElementById("keywords").value;

    let description =
    document.getElementById("description").value;

    let content =
    document.getElementById("content").value;

    let image =
    document.getElementById("image").value;

    let file =
    document.getElementById("file").value;

    let type =
    document.getElementById("type").value;

    if(
        !title ||
        !keywords ||
        !description ||
        !content
    ){

        alert("Fill required");
        return;
    }

    if(
        type === "admin" &&
        currentUser.role !== "admin"
    ){

        alert("Only admin");
        return;
    }

    let id = Date.now();

    db.ref("scripts/" + id).set({

        id:id,
        title:title,
        keywords:keywords,
        description:description,
        content:content,
        image:image,
        file:file,
        type:type,
        author:currentUser.username,
        likes:0,
        views:0,
        createdAt:new Date().toLocaleString()

    });

    alert("Shared");

}

/* COPY */

function copyScript(text){

    navigator.clipboard.writeText(text);

    alert("Copied");
}

/* DELETE */

function deleteScript(id){

    if(currentUser.role !== "admin"){

        alert("Only admin");
        return;
    }

    db.ref("scripts/" + id).remove();
}

/* LIKE */

function likeScript(id){

    db.ref("scripts/" + id)
    .once("value")
    .then(snapshot => {

        let data = snapshot.val();

        db.ref("scripts/" + id + "/likes")
        .set((data.likes || 0) + 1);

    });
}

/* SEARCH */

function searchScript(){

    let input =
    document.getElementById("search")
    .value
    .toLowerCase();

    let scripts =
    document.querySelectorAll(".script");

    scripts.forEach(script => {

        if(
            script.innerText
            .toLowerCase()
            .includes(input)
        ){

            script.style.display = "block";

        }else{

            script.style.display = "none";
        }

    });
}

/* RENDER */

db.ref("scripts").on("value", snapshot => {

    let adminBox =
    document.getElementById("adminScripts");

    let communityBox =
    document.getElementById("communityScripts");

    adminBox.innerHTML = "";
    communityBox.innerHTML = "";

    let total = 0;

    snapshot.forEach(child => {

        total++;

        let script = child.val();

        let html = `

        <div class="script">

            <h3>${script.title}</h3>

            <p>👤 ${script.author}</p>

            <p>🕒 ${script.createdAt}</p>

            <p>🏷 ${script.keywords}</p>

            <p>📌 ${script.description}</p>

            ${
                script.image
                ?
                `<img src="${script.image}">`
                :
                ``
            }

            <pre>${escapeHtml(script.content)}</pre>

            ${
                script.file
                ?
                `
                <a href="${script.file}" target="_blank">
                <button>
                📁 Download File
                </button>
                </a>
                `
                :
                ``
            }

            <br>

            <button
            class="copy-btn"
            onclick='copyScript(${JSON.stringify(script.content)})'
            >
            📋 Copy
            </button>

            <button
            class="like-btn"
            onclick="likeScript(${script.id})"
            >
            ❤️ ${script.likes || 0}
            </button>

            ${
                currentUser &&
                currentUser.role === "admin"
                ?
                `
                <button
                class="delete-btn"
                onclick="deleteScript(${script.id})"
                >
                🗑 Delete
                </button>
                `
                :
                ``
            }

        </div>

        `;

        if(script.type === "admin"){

            adminBox.innerHTML += html;

        }else{

            communityBox.innerHTML += html;
        }

    });

    document.getElementById("scriptCount")
    .innerText = total;

});

/* ESCAPE */

function escapeHtml(text){

    return text
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

/* MENU */

function toggleMenu(){

    document
    .getElementById("sidebar")
    .classList
    .toggle("active");
}

loadUI();

</script>

</body>
    </html>
