<!DOCTYPE html>
<html lang="vi">
<head>
<title>Rain Share - Community Script Sharing</title>

<meta name="description" content="Share and discover scripts with the Rain Share community.">

<meta name="keywords" content="Rain Share, Roblox Script, Script Hub, Share Script">

<meta name="author" content="HCROBLOX">

<meta name="robots" content="index, follow">

<meta property="og:title" content="Rain Share">

<meta property="og:description" content="Community script sharing website">

<meta property="og:type" content="website">

<meta property="og:url" content="https://hcroblox.github.io/Rain-share.github.io/">

<meta property="og:image" content="https://hcroblox.github.io/Rain-share.github.io/logo.png">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo.png">


<style>
body{
    margin:0;
    padding:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#111827;
    padding:30px;
    text-align:center;
    border-bottom:3px solid #38bdf8;
}

.logo{
    margin-top:10px;
}

.logo img{
    width:150px;
    border-radius:20px;
    box-shadow:0 0 25px #38bdf8;
}

header h1{
    margin-top:20px;
    font-size:40px;
    color:#38bdf8;
}

header p{
    color:#cbd5e1;
    font-size:18px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    margin-top:30px;
}

.box{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
    color:#38bdf8;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

textarea{
    width:100%;
    height:120px;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.script-card{
    background:#334155;
    padding:20px;
    border-radius:15px;
    margin-top:15px;
}

.script-card h3{
    margin:0;
    color:#38bdf8;
}

.script-card pre{
    white-space:pre-wrap;
    margin-top:10px;
    color:#e2e8f0;
}

.footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
}   
</style>
</head>
<body>

<header>

<div class="logo">
<img src="logo.png" width="150">
</div>

<h1>🌧️ Rain Share</h1>

<p>Community Script Sharing Website</p>

</header>

<div class="container">

    <!-- LOGIN REGISTER -->

    <div id="authBox" class="box">

        <h2>🔐 Login</h2>

        <input type="text" id="loginUser" placeholder="Username">

        <input type="password" id="loginPass" placeholder="Password">

        <button onclick="login()">Login</button>

        <hr>

        <h2>📝 Register</h2>

        <input type="text" id="registerUser" placeholder="Username">

        <input type="password" id="registerPass" placeholder="Password">

        <button onclick="register()">Register</button>

    </div>

    <!-- MAIN -->

    <div id="mainBox" class="hidden">

        <div class="box">

            <h2>📤 Share Script</h2>

            <input type="text" id="title" placeholder="Script title">

            <textarea id="content" placeholder="Paste script here..."></textarea>

            <select id="type">
                <option value="community">🌍 Community Share</option>
                <option value="admin">👑 Admin Share</option>
            </select>

            <button onclick="shareScript()">Share Script</button>

            <button onclick="logout()">Logout</button>

        </div>

        <div class="box">

            <h2>👑 Admin Share</h2>

            <div id="adminScripts"></div>

        </div>

        <div class="box">

            <h2>🌍 Community Share</h2>

            <div id="communityScripts"></div>

        </div>

    </div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [
    {
        username:"admin",
        password:"admin123",
        role:"admin"
    }
];

let scripts = JSON.parse(localStorage.getItem("scripts")) || [];

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

function saveData(){

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    localStorage.setItem(
        "scripts",
        JSON.stringify(scripts)
    );
}

function register(){

    let user =
        document.getElementById("registerUser").value;

    let pass =
        document.getElementById("registerPass").value;

    if(!user || !pass){

        alert("Fill all fields");
        return;
    }

    let exist = users.find(
        u => u.username === user
    );

    if(exist){

        alert("Username already exists");
        return;
    }

    users.push({

        username:user,
        password:pass,
        role:"user"
    });

    saveData();

    alert("Register success");
}

function login(){

    let user =
        document.getElementById("loginUser").value;

    let pass =
        document.getElementById("loginPass").value;

    let found = users.find(
        u =>
        u.username === user &&
        u.password === pass
    );

    if(!found){

        alert("Wrong account");
        return;
    }

    currentUser = found;

    localStorage.setItem(
        "currentUser",
        JSON.stringify(found)
    );

    loadUI();
}

function logout(){

    localStorage.removeItem("currentUser");

    location.reload();
}

function loadUI(){

    if(currentUser){

        document.getElementById("authBox")
            .classList.add("hidden");

        document.getElementById("mainBox")
            .classList.remove("hidden");

        renderScripts();

    }else{

        document.getElementById("authBox")
            .classList.remove("hidden");

        document.getElementById("mainBox")
            .classList.add("hidden");
    }
}

function shareScript(){

    let title =
        document.getElementById("title").value;

    let content =
        document.getElementById("content").value;

    let type =
        document.getElementById("type").value;

    if(!title || !content){

        alert("Fill all");
        return;
    }

    if(type === "admin" &&
        currentUser.role !== "admin"){

        alert("Only admin can share admin scripts");
        return;
    }

    scripts.unshift({

        id:Date.now(),

        title:title,

        content:content,

        type:type,

        author:currentUser.username
    });

    saveData();

    renderScripts();

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
}

function copyScript(text){

    navigator.clipboard.writeText(text);

    alert("Copied");
}

function deleteScript(id){

    scripts = scripts.filter(
        s => s.id !== id
    );

    saveData();

    renderScripts();
}

function renderScripts(){

    let adminBox =
        document.getElementById("adminScripts");

    let communityBox =
        document.getElementById("communityScripts");

    adminBox.innerHTML = "";
    communityBox.innerHTML = "";

    scripts.forEach(script => {

        let html = `

        <div class="script">

            <h3>${script.title}</h3>

            <p>👤 ${script.author}</p>

            <pre>${escapeHtml(script.content)}</pre>

            <button
                class="copy-btn"
                onclick='copyScript(${JSON.stringify(script.content)})'
            >
                📋 Copy
            </button>

            <button
                class="delete-btn"
                onclick="deleteScript(${script.id})"
            >
                🗑 Delete
            </button>

        </div>

        `;

        if(script.type === "admin"){

            adminBox.innerHTML += html;

        }else{

            communityBox.innerHTML += html;
        }
    });
}

function escapeHtml(text){

    return text
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

loadUI();

</script>

</body>
  </html>
